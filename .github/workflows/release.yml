name: Release

# Triggers on tag push (e.g. `git push origin v0.1.3`).
# Builds the .plugin file and attaches it to the GitHub Release that the tag creates.
#
# This is the lazy-mode release path: bump the version, commit, tag, push,
# and the workflow builds and uploads the artifact for you. No manual zip,
# no gh CLI invocations from your laptop.
#
# Manual `scripts/release.sh` still works if you want full local control or
# need to release without pushing a tag.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$TAG" != "$PLUGIN_VERSION" ]; then
            echo "ERROR: tag is v$TAG but plugin.json says $PLUGIN_VERSION" >&2
            exit 1
          fi
          if ! grep -q "^## ${TAG}" CHANGELOG.md; then
            echo "ERROR: no '## ${TAG}' section in CHANGELOG.md" >&2
            exit 1
          fi
          echo "Tag, plugin.json, and CHANGELOG all agree: $TAG"

      - name: Validate plugin.json description length
        run: |
          DESC_LEN=$(python3 -c "import json; print(len(json.load(open('.claude-plugin/plugin.json'))['description']))")
          if [ "$DESC_LEN" -gt 256 ]; then
            echo "::error::plugin.json description is $DESC_LEN chars; Cowork's validator caps at ~256. Shorten it."
            exit 1
          fi
          echo "plugin.json description: $DESC_LEN chars (OK)"

      - name: Build .plugin artifact
        run: |
          # Excluded files documented in scripts/release.sh
          zip -r /tmp/scriptorium-cowork.plugin . \
            -x "*.git*" "*.DS_Store" "*.plugin" \
               "scripts/*" \
               ".github/*" \
               ".claude-plugin/marketplace.json"
          ls -la /tmp/scriptorium-cowork.plugin
          echo "SKILL.md count: $(unzip -l /tmp/scriptorium-cowork.plugin | grep -c 'SKILL\.md$')"

      - name: Extract CHANGELOG section for release notes
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          awk -v v="$TAG" '
            /^## / { if (capture) exit; if ($2 == v) { capture=1; print; next } }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          gh release create "v$TAG" \
            --title "Scriptorium for Cowork v$TAG" \
            --notes-file /tmp/release-notes.md \
            /tmp/scriptorium-cowork.plugin
